  hp_room_target_temp:
    name: "Cílová teplota místnosti (ochrana)"
    min: 16
    max: 26
    step: 0.5
    unit_of_measurement: "°C"

input_boolean:
  hp_heating_curve_enabled:
    name: "Topná křivka – aktivní"
    icon: mdi:chart-bell-curve

  hp_dashboard_locked:
    name: "Zámek ovládání"
    icon: mdi:lock

  hp_auto_silent_mode:
    name: "Auto tichý režim (jen topení)"
    icon: mdi:volume-off

  hp_dhw_tariff_control:
    name: "TUV – řízení tarifem"
    icon: mdi:cash-clock

  hp_dhw_auto_off:
    name: "TUV – automaticky vypnuto (tarif)"
    icon: mdi:water-boiler-off

input_select:
  # Input Select
  # -----------------------------------------
  hp_set_operation_mode:
    name: "Selector Heatpump Operation Mode"
    options:
      - "Chlazení"
      - "Topení"
      - "Auto"

  hp_set_control_method:
    name: "Selector Heatpump Control Method"
    options:
      - "Water Outlet Temp. Control"
      - "Water Inlet Temp. Control"
      - "Room Air Control"

template:
  # Template sensors for better readability
  #-----------------------------------------
  - binary_sensor:
      - name: "HP Backup Heater Active"
        unique_id: "hp_backup_heater_active"
        device_class: heat
        state: >
          {{ states('sensor.shellypro3em_a4f00fcfb120_phase_c_vykon') | float(0) > 50 }}

      - name: "HP High Tariff"
        unique_id: "hp_high_tariff"
        icon: mdi:cash-clock
        state: >
          {% set t = now().hour * 100 + now().minute %}
          {{ (611 <= t < 710) or (1116 <= t < 1215) or (1546 <= t < 1645) or (2006 <= t < 2105) }}

  - sensor:
      - name: "HP Energy State"
        unique_id: "hp_energy_state_label"
        state: >
            {% set v = states('sensor.hp_energy_state_input_raw') | int(-1) %}
            {% if v == 0 %} Do Not Use
            {% elif v == 1 %} Forced Off
            {% elif v == 2 %} Normal Operation
            {% elif v == 3 %} On-Recommendation
            {% elif v == 4 %} On-Command
            {% elif v == 5 %} On-Command Step 2
            {% elif v == 6 %} On-Recommendation Step 1
            {% elif v == 7 %} Energy Saving Mode
            {% elif v == 8 %} Super Energy Saving Mode
            {% else %} Unknown
            {% endif %}

      - name: "HP Delta Temp"
        unique_id: "hp_delta_temp"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: >
          {{ (states('sensor.hp_outlet_temp') | float(0) - states('sensor.hp_inlet_temp') | float(0)) | round(1) }}

      - name: "HP Thermal Power"
        unique_id: "hp_thermal_power"
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: >
          {% set compressor_on = is_state('binary_sensor.hp_compressor_status', 'on')
                              and (states('sensor.shellypro3em_a4f00fcfb120_phase_a_vykon') | float(0)
                                 + states('sensor.shellypro3em_a4f00fcfb120_phase_c_vykon') | float(0)) > 100 %}
          {% set flow = states('sensor.hp_flow_rate') | float(0) %}
          {% set dt = states('sensor.hp_delta_temp') | float(0) %}
          {% if compressor_on and flow > 0 and dt > 0 %}
            {{ (flow * 69.77 * dt) | round(0) }}
          {% else %}
            0
          {% endif %}

      - name: "HP Compressor Starts Total"
        unique_id: "hp_compressor_starts_total_sensor"
        unit_of_measurement: "starts"
        state_class: total_increasing
        icon: mdi:counter
        state: "{{ states('counter.hp_compressor_starts_total') | int(0) }}"

      - name: "HP COP Carnot"
        unique_id: "hp_cop_carnot"
        state_class: measurement
        state: >
          {% set t_hot = states('sensor.hp_outlet_temp') | float(0) + 273.15 %}
          {% set t_cold = states('sensor.hp_outside_temp') | float(0) + 273.15 %}
          {{ (t_hot / (t_hot - t_cold)) | round(2) if (t_hot - t_cold) > 0 else 999 }}

      - name: "HP COP"
        unique_id: "hp_cop"
        state_class: measurement
        state: >
          {% set compressor_on = is_state('binary_sensor.hp_compressor_status', 'on') %}
          {% set p_thermal = states('sensor.hp_thermal_power') | float(0) %}
          {% set p_elec = states('sensor.shellypro3em_a4f00fcfb120_phase_a_vykon') | float(0)
                        + states('sensor.shellypro3em_a4f00fcfb120_phase_c_vykon') | float(0) %}
          {% if compressor_on and p_thermal > 0 and p_elec > 100 %}
            {{ [p_thermal / p_elec, states('sensor.hp_cop_carnot') | float(999)] | min | round(2) }}
          {% else %}
            0
          {% endif %}

      - name: "HP COP DHW"
        unique_id: "hp_cop_dhw"
        state_class: measurement
        state: >
          {% set compressor_on = is_state('binary_sensor.hp_compressor_status', 'on') %}
          {% set dhw_on = is_state('binary_sensor.hp_dhw_heating_status', 'on') %}
          {% set p_thermal = states('sensor.hp_thermal_power') | float(0) %}
          {% set p_elec = states('sensor.shellypro3em_a4f00fcfb120_vykon') | float(0) %}
          {% if compressor_on and dhw_on and p_thermal > 0 and p_elec > 100 %}
            {{ [p_thermal / p_elec, states('sensor.hp_cop_carnot') | float(999)] | min | round(2) }}
          {% else %}
            0
          {% endif %}

      - name: "HP COP Heating"
        unique_id: "hp_cop_heating"
        state_class: measurement
        state: >
          {% set compressor_on = is_state('binary_sensor.hp_compressor_status', 'on') %}
          {% set dhw_off = is_state('binary_sensor.hp_dhw_heating_status', 'off') %}
          {% set p_thermal = states('sensor.hp_thermal_power') | float(0) %}
          {% set p_elec = states('sensor.shellypro3em_a4f00fcfb120_vykon') | float(0) %}
          {% if compressor_on and dhw_off and p_thermal > 0 and p_elec > 100 %}
            {{ [p_thermal / p_elec, states('sensor.hp_cop_carnot') | float(999)] | min | round(2) }}
          {% else %}
            0
          {% endif %}

      - name: "HP Thermal Power DHW"
        unique_id: "hp_thermal_power_dhw"
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: >
          {{ states('sensor.hp_thermal_power') | float(0)
             if is_state('binary_sensor.hp_dhw_heating_status', 'on') else 0 }}

      - name: "HP Thermal Power Heating"
        unique_id: "hp_thermal_power_heating"
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: >
          {{ states('sensor.hp_thermal_power') | float(0)
             if is_state('binary_sensor.hp_dhw_heating_status', 'off')
             and is_state('binary_sensor.hp_compressor_status', 'on') else 0 }}

      - name: "HP Electrical Power DHW"
        unique_id: "hp_electrical_power_dhw"
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: >
          {{ states('sensor.shellypro3em_a4f00fcfb120_vykon') | float(0)
             if is_state('binary_sensor.hp_dhw_heating_status', 'on') else 0 }}

      - name: "HP Electrical Power Heating"
        unique_id: "hp_electrical_power_heating"
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: >
          {{ states('sensor.shellypro3em_a4f00fcfb120_vykon') | float(0)
             if is_state('binary_sensor.hp_dhw_heating_status', 'off')
             and is_state('binary_sensor.hp_compressor_status', 'on') else 0 }}

      - name: "HP SCOP DHW"
        unique_id: "hp_scop_dhw"
        state_class: measurement
        state: >
          {% set thermal = states('sensor.hp_thermal_energy_dhw') | float(0) %}
          {% set elec = states('sensor.hp_electrical_energy_dhw') | float(0) %}
          {{ (thermal / elec) | round(2) if elec > 0 else 0 }}

      - name: "HP SCOP Heating"
        unique_id: "hp_scop_heating"
        state_class: measurement
        state: >
          {% set thermal = states('sensor.hp_thermal_energy_heating') | float(0) %}
          {% set elec = states('sensor.hp_electrical_energy_heating') | float(0) %}
          {{ (thermal / elec) | round(2) if elec > 0 else 0 }}

      - name: "HP COP stats"
        unique_id: "hp_cop_stats"
        state_class: measurement
        state: >
          {% set cop = states('sensor.hp_cop') | float(0) %}
          {{ cop if cop > 0 else none }}

      - name: "HP SCOP"
        unique_id: "hp_scop"
        state_class: measurement
        state: >
          {% set thermal = states('sensor.hp_thermal_energy') | float(0) %}
          {% set elec = states('sensor.hp_electrical_energy') | float(0) %}
          {{ (thermal / elec) | round(2) if elec > 0 else 0 }}

      # --- Topná křivka ---

      - name: "HP Curve Design Temp"
        unique_id: "hp_curve_design_temp"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: >
          {% set current = states('sensor.hp_outside_temp') | float(99) %}
          {% set forecast = states('input_number.hp_forecast_min_temp') | float(99) %}
          {{ [current, forecast] | min | round(1) }}

      - name: "HP Solar Correction"
        unique_id: "hp_solar_correction"
        unit_of_measurement: "°C"
        state_class: measurement
        state: >
          {% set elev = state_attr('sun.sun', 'elevation') | float(0) %}
          {% set cond = states('weather.forecast_home') %}
          {% set max_c = states('input_number.hp_solar_correction_max') | float(4) %}
          {% if elev < 10 %}
            0
          {% elif cond in ['sunny', 'clear-night', 'exceptional'] %}
            {{ (max_c * [1.0, (elev - 10) / 30] | min) | round(1) | float * -1 }}
          {% elif cond in ['partlycloudy'] %}
            {{ (max_c * 0.4 * [1.0, (elev - 10) / 40] | min) | round(1) | float * -1 }}
          {% else %}
            0
          {% endif %}

      - name: "HP Room Correction"
        unique_id: "hp_room_correction"
        unit_of_measurement: "°C"
        state_class: measurement
        state: >
          {% set room = states('sensor.hp_room_temp') | float(0) %}
          {% set target = states('input_number.hp_room_target_temp') | float(21) %}
          {{ [[(target - room) * 3, -10] | max, 10] | min | round(1) }}

      - name: "HP Forecast Min Temp"
        unique_id: "hp_forecast_min_temp"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: "{{ states('input_number.hp_forecast_min_temp') | float(0) | round(1) }}"

      - name: "HP Curve Raw"
        unique_id: "hp_curve_raw"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: >
          {% set t_out = states('sensor.hp_curve_design_temp') | float(0) %}
          {% set t1 = states('input_number.hp_curve_point1_outdoor') | float(18) %}
          {% set w1 = states('input_number.hp_curve_point1_water') | float(24) %}
          {% set t2 = states('input_number.hp_curve_point2_outdoor') | float(-5) %}
          {% set w2 = states('input_number.hp_curve_point2_water') | float(30) %}
          {% set cutoff = states('input_number.hp_curve_heating_cutoff') | float(18) %}
          {% set min_t = states('input_number.hp_curve_min_temp') | float(20) %}
          {% if t_out >= cutoff %}
            {{ min_t | int }}
          {% else %}
            {{ (w1 + (w2 - w1) / (t2 - t1) * (t_out - t1)) | round(1) }}
          {% endif %}

      - name: "HP Heating Curve Setpoint"
        unique_id: "hp_heating_curve_setpoint"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: >
          {% set raw = states('sensor.hp_curve_raw') | float(0) %}
          {% set min_t = states('input_number.hp_curve_min_temp') | float(20) %}
          {% set solar = states('sensor.hp_solar_correction') | float(0) %}
          {% set room = states('sensor.hp_room_correction') | float(0) %}
          {% set shift = states('input_number.hp_curve_shift') | float(0) %}
          {{ [min_t, raw + solar + room + shift] | max | round(0) | int }}

# ---------------------------------------------------------------------------------------------------------------
# Automations: Write modbus registers on input changes via GUI
# note: If you change a value by the sliders, it will take up to 60 seconds until the state variables are updated
# ---------------------------------------------------------------------------------------------------------------

automation:
  ### Input Select Operation Mode ###
  #-------------------------------------------------------------------------------
  - id: "hp_automation_operation_mode_modbus_update"
    alias: "[Heatpump] Operation Mode Modbus Update"
    description: "Select Operation Mode of Heatpump - send via Modbus"
    triggers:
      - trigger: state
        entity_id:
          - input_select.hp_set_operation_mode
    condition: []
    variables:
      cooling: 0
      auto: 3
      heating: 4
    action:
      - action: modbus.write_register
        data:
          hub: lg_heatpump
          slave: 1
          address: 0
          value: >-
            {% if is_state('input_select.hp_set_operation_mode', 'Chlazení') %} {{cooling}}
            {% elif is_state('input_select.hp_set_operation_mode', 'Topení') %} {{heating}}
            {% else %}
            {{auto}}
            {% endif %}
    mode: single

  - id: "hp_automation_operation_mode_input_select_update"
    alias: "[Heatpump] Operation Mode InputSelect Update"
    description: "Select Operation Mode of Heatpump - Read from State"
    triggers:
      - trigger: state
        entity_id:
          - sensor.hp_operation_mode
    condition: []
    action:
      - action: input_select.select_option
        target:
          entity_id: input_select.hp_set_operation_mode
        data:
          option: >
            {% if is_state('sensor.hp_operation_mode', '3') %}
            Auto
            {% elif is_state('sensor.hp_operation_mode', '4') %}
            Topení
            {% else %}
            Chlazení
            {% endif %}
    mode: single

  ### Input Select Control Mode ###
  #-------------------------------------------------------------------------------

  - id: "hp_automation_control_method_modbus_update"
    alias: "[Heatpump] Control Method Modbus Update"
    description: "Select Control Method of Heatpump - send via Modbus"
    triggers:
      - trigger: state
        entity_id:
          - input_select.hp_set_control_method
    condition: []
    variables:
      outlet: 0
      inlet: 1
      room_air: 2
    action:
      - action: modbus.write_register
        data_template:
          hub: lg_heatpump
          slave: 1
          address: 1
          value: >-
            {% if is_state('input_select.hp_set_control_method', 'Water Outlet Temp. Control') %}
            {{outlet}}
            {% elif is_state('input_select.hp_set_control_method', 'Water Inlet Temp. Control') %}
            {{inlet}}
            {% else %}
            {{room_air}}
            {% endif %}
    mode: single

  - id: "hp_automation_control_method_input_select_update"
    alias: "[Heatpump] Control Method InputSelect Update"
    description: "Select Control Method of Heatpump - Read from State"
    triggers:
      - trigger: state
        entity_id:
          - sensor.hp_control_method
    condition: []
    action:
      - action: input_select.select_option
        target:
          entity_id: input_select.hp_set_control_method
        data:
          option: >
            {% if is_state('sensor.hp_control_method', '0') %}
            Water Outlet Temp. Control
            {% elif is_state('sensor.hp_control_method', '1') %}
            Water Inlet Temp. Control
            {% else %}
            Room Air Control
            {% endif %}
    mode: single

  ### Setpoint Shift for Heating Circuit 1 (Radiator) ###
  #-------------------------------------------------------------------------------

  - id: "hp_automation_set_shift_value_in_auto_mode_circuit1_modbus_update"
    alias: "hp_automation_set_shift_value_in_auto_mode_circuit1_modbus_update"
    description: "Write change of flow temperature HC1 in AI mode to Modbus"
    triggers:
      - trigger: state
        entity_id:
          - input_number.hp_shift_value_in_auto_mode_circuit1
    condition: []
    action:
      - action: modbus.write_register
        data_template:
          hub: lg_heatpump
          slave: 1
          address: 4
          value: >
            {% if states('input_number.hp_shift_value_in_auto_mode_circuit1') | int(default=0) < 0 %}
            {{states('input_number.hp_shift_value_in_auto_mode_circuit1') | int + 65536 }}
            {% else %}
            {{states('input_number.hp_shift_value_in_auto_mode_circuit1') | int }}
            {% endif %}
    mode: single

  - id: "hp_automation_set_shift_value_in_auto_mode_circuit1_input_slider_update"
    alias: "hp_automation_set_shift_value_in_auto_mode_circuit1_input_slider_update"
    description: "Write change of flow temperature HC1 in AI mode to Input Slider"
    triggers:
      - trigger: state
        entity_id:
          - sensor.hp_shift_value_in_auto_mode_circuit1
    condition: []
    action:
      - action: input_number.set_value
        target:
          entity_id: input_number.hp_shift_value_in_auto_mode_circuit1
        data:
          value: "{{ states('sensor.hp_shift_value_in_auto_mode_circuit1') }}"
    mode: single

  ### HC1 Target Temperature ###
  #-------------------------------------------------------------------------------

  - id: "hp_automation_set_target_temperatur_circuit1_modbus_update"
    alias: "hp_automation_set_target_temperatur_circuit1_modbus_update"
    description: "Write change of HC1 target temperature to Modbus"
    triggers:
      - trigger: state
        entity_id:
          - input_number.hp_circuit1_target_temp
    condition: []
    action:
      - action: modbus.write_register
        data_template:
          hub: lg_heatpump
          slave: 1
          address: 2
          value: "{{ states('input_number.hp_circuit1_target_temp') |float *10 | int}}"
    mode: single

  - id: "hp_automation_set_target_temperatur_circuit1_input_slider_update"
    alias: "hp_automation_set_target_temperatur_circuit1_input_slider_update"
    description: "Write change of HC1 target temperature to Input Slider"
    triggers:
      - trigger: state
        entity_id:
          - sensor.hp_target_temp_circuit1
    condition: []
    action:
      - action: input_number.set_value
        target:
          entity_id: input_number.hp_circuit1_target_temp
        data:
          value: "{{ states('sensor.hp_target_temp_circuit1') }}"
    mode: single

  ### DHW Target Temperature ###
  #-------------------------------------------------------------------------------

  - id: "hp_automation_set_target_temperatur_modbus_update"
    alias: "hp_automation_set_target_temperatur_modbus_update"
    description: "Write change of DHW target temperature to Modbus"
    triggers:
      - trigger: state
        entity_id:
          - input_number.hp_dhw_target_temp
    condition: []
    action:
      - action: modbus.write_register
        data_template:
          hub: lg_heatpump
          slave: 1
          address: 8
          value: "{{ states('input_number.hp_dhw_target_temp') |float *10 | int}}"
    mode: single

  - id: "hp_automation_set_target_temperatur_input_slider_update"
    alias: "hp_automation_set_target_temperatur_input_slider_update"
    description: "Write change of DHW target temperature to Input Slider"
    triggers:
      - trigger: state
        entity_id:
          - sensor.hp_dhw_target_temp
    condition: []
    action:
      - action: input_number.set_value
        target:
          entity_id: input_number.hp_dhw_target_temp
        data:
          value: "{{ states('sensor.hp_dhw_target_temp') }}"
    mode: single

  ### Topná křivka – načtení předpovědi ###
  #-------------------------------------------------------------------------------
  - alias: "hp_automation_fetch_forecast"
    id: "hp_automation_fetch_forecast"
    description: "Každých 15 minut načte hodinovou předpověď a uloží minimální teplotu"
    trigger:
      - platform: time_pattern
        minutes: /15
      - platform: homeassistant
        event: start
    action:
      - service: weather.get_forecasts
        target:
          entity_id: weather.forecast_home
        data:
          type: hourly
        response_variable: forecast_data
      - service: input_number.set_value
        target:
          entity_id: input_number.hp_forecast_min_temp
        data:
          value: >
            {% set hours = states('input_number.hp_forecast_hours') | int(6) %}
            {% set fc = forecast_data['weather.forecast_home']['forecast'][:hours] %}
            {% set temps = fc | map(attribute='temperature') | list %}
            {{ temps | min if temps | length > 0 else states('sensor.hp_outside_temp') | float(0) }}
    mode: single

  ### Topná křivka – přepnutí režimu ###
  #-------------------------------------------------------------------------------
  - alias: "hp_automation_heating_curve_mode_switch"
    id: "hp_automation_heating_curve_mode_switch"
    description: "Při zapnutí křivky přepne do Heating, při vypnutí vrátí do Auto"
    trigger:
      - platform: state
        entity_id: input_boolean.hp_heating_curve_enabled
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.hp_heating_curve_enabled
                state: "on"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.hp_set_operation_mode
                data:
                  option: "Topení"
          - conditions:
              - condition: state
                entity_id: input_boolean.hp_heating_curve_enabled
                state: "off"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.hp_set_operation_mode
                data:
                  option: "Auto"
    mode: single

  ### Topná křivka – aplikace setpointu ###
  #-------------------------------------------------------------------------------
  ### Auto tichý režim – pouze při topení (ne TUV) ###
  #-------------------------------------------------------------------------------
  - alias: "hp_automation_auto_silent_mode_enable"
    id: "hp_automation_auto_silent_mode_enable"
    description: >
      Zapne tichý režim, když se spustí kompresor a NEJDE o ohřev TUV.
      Aktivuje se jen pokud je zapnutá funkce hp_auto_silent_mode.
    trigger:
      - platform: state
        entity_id: binary_sensor.hp_compressor_status
        to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.hp_auto_silent_mode
        state: "on"
      - condition: state
        entity_id: binary_sensor.hp_dhw_heating_status
        state: "off"
    action:
      - service: switch.turn_on
        target:
          entity_id: switch.hp_silent_mode
    mode: single

  - alias: "hp_automation_auto_silent_mode_disable"
    id: "hp_automation_auto_silent_mode_disable"
    description: >
      Vypne tichý režim, když kompresor skončí nebo začne ohřev TUV.
      Aktivuje se jen pokud je zapnutá funkce hp_auto_silent_mode.
    trigger:
      - platform: state
        entity_id: binary_sensor.hp_compressor_status
        to: "off"
      - platform: state
        entity_id: binary_sensor.hp_dhw_heating_status
        to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.hp_auto_silent_mode
        state: "on"
    action:
      - service: switch.turn_off
        target:
          entity_id: switch.hp_silent_mode
    mode: single

  ### TUV tarif – předehřev ###
  #-------------------------------------------------------------------------------
  - alias: "hp_automation_dhw_preheat"
    id: "hp_automation_dhw_preheat"
    description: >
      45 min před vysokým tarifem uloží cílovou teplotu TUV, zvýší ji o 5°C
      a zapne ohřev TUV (aby se stihla dohřát před tarifem).
    trigger:
      - platform: time
        at: "05:26:00"
      - platform: time
        at: "10:31:00"
      - platform: time
        at: "15:01:00"
      - platform: time
        at: "19:21:00"
    condition:
      - condition: state
        entity_id: input_boolean.hp_dhw_tariff_control
        state: "on"
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.hp_dhw_target_saved
        data:
          value: "{{ states('input_number.hp_dhw_target_temp') | float(48) }}"
      - service: input_number.set_value
        target:
          entity_id: input_number.hp_dhw_target_temp
        data:
          value: "{{ [states('input_number.hp_dhw_target_temp') | float(48) + 5, 60] | min }}"
      - service: switch.turn_on
        target:
          entity_id: switch.hp_dhw
    mode: single

  ### TUV tarif – start vysokého tarifu ###
  #-------------------------------------------------------------------------------
  - alias: "hp_automation_dhw_high_tariff_start"
    id: "hp_automation_dhw_high_tariff_start"
    description: >
      Při startu vysokého tarifu uloží stav DHW switche, obnoví původní cílovou
      teplotu TUV a vypne ohřev TUV.
    trigger:
      - platform: time
        at: "06:11:00"
      - platform: time
        at: "11:16:00"
      - platform: time
        at: "15:46:00"
      - platform: time
        at: "20:06:00"
    condition:
      - condition: state
        entity_id: input_boolean.hp_dhw_tariff_control
        state: "on"
    action:
      - service: input_boolean.set_value
        target:
          entity_id: input_boolean.hp_dhw_auto_off
        data:
          value: "{{ is_state('switch.hp_dhw', 'on') }}"
      - service: input_number.set_value
        target:
          entity_id: input_number.hp_dhw_target_temp
        data:
          value: "{{ states('input_number.hp_dhw_target_saved') | float(48) }}"
      - service: switch.turn_off
        target:
          entity_id: switch.hp_dhw
    mode: single

  ### TUV tarif – konec vysokého tarifu ###
  #-------------------------------------------------------------------------------
  - alias: "hp_automation_dhw_high_tariff_end"
    id: "hp_automation_dhw_high_tariff_end"
    description: >
      Při konci vysokého tarifu obnoví ohřev TUV, pokud byl zapnutý před tarifem.
    trigger:
      - platform: time
        at: "07:10:00"
      - platform: time
        at: "12:15:00"
      - platform: time
        at: "16:45:00"
      - platform: time
        at: "21:05:00"
    condition:
      - condition: state
        entity_id: input_boolean.hp_dhw_tariff_control
        state: "on"
      - condition: state
        entity_id: input_boolean.hp_dhw_auto_off
        state: "on"
    action:
      - service: switch.turn_on
        target:
          entity_id: switch.hp_dhw
    mode: single

  - alias: "hp_automation_compressor_start_counter"
    id: "hp_automation_compressor_start_counter"
    description: "Inkrementuje celkový počet startů kompresoru"
    trigger:
      - platform: state
        entity_id: binary_sensor.hp_compressor_status
        to: "on"
    action:
      - service: counter.increment
        target:
          entity_id: counter.hp_compressor_starts_total
    mode: single

  - alias: "hp_automation_apply_heating_curve"
    id: "hp_automation_apply_heating_curve"
    description: >
      Zvýšení setpointu: okamžitě při změně venkovní teploty, korekcí nebo zapnutí křivky.
      Snížení setpointu: každou hodinu (timer).
    trigger:
      - platform: time_pattern
        hours: /1
        id: "timer"
      - platform: state
        entity_id:
          - sensor.hp_outside_temp
          - sensor.hp_solar_correction
          - sensor.hp_room_correction
        id: "outdoor_temp"
      - platform: state
        entity_id: input_boolean.hp_heating_curve_enabled
        to: "on"
        id: "curve_enabled"
    condition:
      - condition: state
        entity_id: input_boolean.hp_heating_curve_enabled
        state: "on"
      - condition: state
        entity_id: input_select.hp_set_operation_mode
        state: "Topení"
      - condition: template
        value_template: >
          {% set new = states('sensor.hp_heating_curve_setpoint') | int %}
          {% set cur = states('input_number.hp_circuit1_target_temp') | int %}
          {% set diff = new - cur %}
          {% if trigger.id == 'timer' %}
            {{ diff | abs >= 1 }}
          {% else %}
            {{ diff >= 1 }}
          {% endif %}
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.hp_circuit1_target_temp
        data:
          value: "{{ states('sensor.hp_heating_curve_setpoint') | int }}"
    mode: single


##############################################################
# COUNTER
##############################################################
counter:
  hp_compressor_starts_total:
    name: "HP Starty kompresoru celkem"
    icon: mdi:counter
    step: 1


##############################################################
# STATISTICS SENSORS
##############################################################
sensor:
  - platform: history_stats
    name: "HP Compressor Starts Today"
    unique_id: hp_compressor_starts_today
    entity_id: binary_sensor.hp_compressor_status
    state: "on"
    type: count
    start: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0) }}"
    end: "{{ now() }}"

  - platform: history_stats
    name: "HP Compressor Starts Week"
    unique_id: hp_compressor_starts_week
    entity_id: binary_sensor.hp_compressor_status
    state: "on"
    type: count
    start: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0) - timedelta(days=now().weekday()) }}"
    end: "{{ now() }}"

  - platform: history_stats
    name: "HP Compressor Starts Month"
    unique_id: hp_compressor_starts_month
    entity_id: binary_sensor.hp_compressor_status
    state: "on"
    type: count
    start: "{{ now().replace(day=1, hour=0, minute=0, second=0, microsecond=0) }}"
    end: "{{ now() }}"

  - platform: history_stats
    name: "HP Compressor Starts Year"
    unique_id: hp_compressor_starts_year
    entity_id: binary_sensor.hp_compressor_status
    state: "on"
    type: count
    start: "{{ now().replace(month=1, day=1, hour=0, minute=0, second=0, microsecond=0) }}"
    end: "{{ now() }}"

  - platform: statistics
    name: "HP COP průměr"
    unique_id: hp_cop_avg
    entity_id: sensor.hp_cop_stats
    state_characteristic: mean
    max_age:
      minutes: 2
    sampling_size: 12
    precision: 2

  - platform: integration
    source: sensor.hp_thermal_power
    name: "HP Thermal Energy"
    unique_id: hp_thermal_energy
    unit_prefix: k
    method: left
