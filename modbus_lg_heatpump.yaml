    step: 1
    unit_of_measurement: "°C"

  hp_curve_point2_outdoor:
    name: "Topná křivka – bod 2 venkovní teplota (studený)"
    min: -20
    max: 10
    step: 1
    unit_of_measurement: "°C"

  hp_curve_point2_water:
    name: "Topná křivka – bod 2 teplota vody (studený)"
    min: 20
    max: 55
    step: 1
    unit_of_measurement: "°C"

  hp_curve_max_temp:
    name: "Topná křivka – max. teplota vody"
    min: 20
    max: 45
    step: 1
    unit_of_measurement: "°C"

  hp_curve_min_temp:
    name: "Topná křivka – min. teplota vody"
    min: 15
    max: 35
    step: 1
    unit_of_measurement: "°C"

  hp_curve_shift:
    name: "Topná křivka – posun setpointu"
    min: -5
    max: 5
    step: 0.5
    unit_of_measurement: "°C"

  hp_curve_heating_cutoff:
    name: "Topná křivka – cutoff venkovní teplota"
    min: 10
    max: 25
    step: 1
    unit_of_measurement: "°C"

  hp_forecast_hours:
    name: "Předpověď – počet hodin dopředu"
    min: 1
    max: 12
    step: 1

  hp_forecast_min_temp:
    name: "Předpověď – min. teplota (auto)"
    min: -30
    max: 40
    step: 0.1
    unit_of_measurement: "°C"

  hp_solar_correction_max:
    name: "Solární korekce – maximum"
    min: 0
    max: 8
    step: 0.5
