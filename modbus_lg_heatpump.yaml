# Home Assistant LG Heatpump integration
# last update: 2025-10-11 (for Homeassistant update 2025.10.4)

modbus:
  - name: "lg_heatpump"
    type: tcp
    host: !secret lg_heatpump_modbus_host_ip
    port: !secret lg_heatpump_modbus_port

    #------------------------------------------
    sensors:
      # Technical Data
      # Input Register
      #------------------------------------------

      - name: "hp_error_code"
        unique_id: "modbus.hp_error_code"
        scan_interval: 10
        address: 0 # reg 01
        slave: 1
        input_type: input

      - name: "hp_odu_operation_cycle"
        unique_id: "modbus.hp_odu_operation_cycle"
        scan_interval: 10
        address: 1 # reg 02
        slave: 1
        input_type: input

      - name: "hp_inlet_temp"
        unique_id: "modbus.hp_inlet_temp"
        scale: 0.1
        precision: 2
        scan_interval: 10
        address: 2 # reg 03
        slave: 1
        unit_of_measurement: °C
        device_class: temperature
        input_type: input

      - name: "hp_outlet_temp"
        unique_id: "modbus.hp_outlet_temp"
        scale: 0.1
        precision: 2
        scan_interval: 10
        address: 3 # reg 04
        slave: 1
        unit_of_measurement: °C
        device_class: temperature
        input_type: input

      - name: "hp_backup_heater_outlet_temp"
        unique_id: "modbus.hp_backup_heater_outlet_temp"
        scale: 0.1
        precision: 2
        scan_interval: 10
        address: 4 # reg 05
        slave: 1
        unit_of_measurement: °C
        device_class: temperature
        input_type: input

      - name: "hp_dhw_water_temp"
        unique_id: "modbus.hp_dhw_water_temp"
        scale: 0.1
        precision: 2
        scan_interval: 10
        address: 5 # reg 06
        slave: 1
        unit_of_measurement: °C
        device_class: temperature
        input_type: input

      - name: "hp_solar_collector_temp"
        unique_id: "modbus.hp_solar_collector_temp"
        scale: 0.1
        precision: 2
        scan_interval: 10
        address: 6 # reg 07
        slave: 1
        unit_of_measurement: °C
        device_class: temperature
        input_type: input

      - name: "hp_room_temp" # Utility Room Temperature
        unique_id: "modbus.hp_room_temp"
        precision: 2
        scan_interval: 10
        address: 7 # reg 08
        slave: 1
        scale: 0.1
        device_class: temperature
        unit_of_measurement: °C
        input_type: input

      - name: "hp_flow_rate"
        unique_id: "modbus.hp_flow_rate"
        precision: 2
        scale: 0.1
        scan_interval: 10
        address: 8 # reg 09
        slave: 1
        device_class: volume_flow_rate
        unit_of_measurement: L/min
        input_type: input

      - name: "hp_energy_state_input"
        unique_id: "modbus.hp_energy_state_input"
        scan_interval: 10
        address: 11 # reg 12
        slave: 1
        input_type: input

      - name: "hp_outside_temp" # Outside Temperature
        unique_id: "modbus.hp_outside_temp"
        precision: 2
        scan_interval: 10
        address: 12 # reg 13
        slave: 1
        scale: 0.1
        device_class: temperature
        unit_of_measurement: °C
        input_type: input

      - name: "hp_water_pressure" # Water Pressure
        unique_id: "modbus.hp_water_pressure"
        precision: 2
        scan_interval: 10
        address: 13 # reg 14
        slave: 1
        scale: 0.1
        device_class: pressure
        unit_of_measurement: bar
        input_type: input

      - name: "hp_temp_liquid_gas" # Liquid Gas Temperature [0.1 °C ×10]
        unique_id: "modbus.hp_temp_liquid_gas"
        scan_interval: 10
        precision: 2
        slave: 1
        scale: 0.1
        address: 16 # reg 17
        device_class: temperature
        unit_of_measurement: °C
        input_type: input

      - name: "hp_temp_pipe_out" # Pipe out temp [0.01 °C ×10]
        unique_id: "modbus.hp_temp_pipe_out"
        scan_interval: 10
        precision: 2
        slave: 1
        scale: 0.01
        address: 17 # reg 18
        device_class: temperature
        unit_of_measurement: °C
        input_type: input

      - name: "hp_temp_suction" # Suction Temperature [0.1 °C ×10]
        unique_id: "modbus.hp_temp_suction"
        scan_interval: 10
        precision: 2
        slave: 1
        scale: 0.1
        address: 18 # reg 19
        device_class: temperature
        unit_of_measurement: °C
        input_type: input

      - name: "hp_temp_heatgas" # Hot Gas Temperature [0.1 °C ×10]
        unique_id: "modbus.hp_temp_heatgas"
        precision: 2
        scan_interval: 10
        slave: 1
        scale: 0.1
        address: 19 # reg 20
        device_class: temperature
        unit_of_measurement: °C
        input_type: input

      - name: "hp_temp_before_vaporiser" # Steam Temperature Before Evaporator
        unique_id: "modbus.hp_temp_before_vaporiser"
        precision: 2
        scan_interval: 10
        address: 20 # reg 21
        slave: 1
        scale: 0.1
        device_class: temperature
        unit_of_measurement: °C
        input_type: input

      - name: "hp_temp_after_vaporiser" # Steam Temperature After Evaporator
        unique_id: "modbus.hp_temp_after_vaporiser"
        precision: 2
        scan_interval: 10
        address: 21 # reg 22
        scale: 0.1
        device_class: temperature
        unit_of_measurement: °C
        slave: 1
        input_type: input

      - name: "hp_high_pressure" # Steam Pressure Condenser [0.1 bar ×10]
        unique_id: "modbus.hp_high_pressure"
        precision: 2
        scan_interval: 10
        scale: 0.01
        address: 22 # reg 23
        device_class: pressure
        unit_of_measurement: bar
        slave: 1
        input_type: input

      - name: "hp_low_pressure" # Steam Pressure Evaporator [0.1 bar ×10]
        unique_id: "modbus.hp_low_pressure"
        precision: 2
        scan_interval: 10
        scale: 0.01
        address: 23 # reg 24
        device_class: pressure
        unit_of_measurement: bar
        slave: 1
        input_type: input

      - name: "hp_compressor_rpm" # Compressor RPM
        unique_id: "modbus.hp_compressor_rpm"
        scale: 60
        precision: 0.1
        scan_interval: 10
        address: 24 # reg 25
        slave: 1
        unit_of_measurement: rpm
        input_type: input

      - name: "hp_product_group" # Product Group
        unique_id: "modbus.hp_product_group"
        scan_interval: 60
        address: 9997
        slave: 1
        input_type: input

      - name: "hp_product_info" # Product Info
        unique_id: "modbus.hp_product_info"
        scan_interval: 60
        address: 9998
        slave: 1
        input_type: input

      # Holding Register
      #------------------------------------------

      - name: "hp_operation_mode"
        unique_id: "modbus.hp_operation_mode"
        scan_interval: 10
        address: 0 # reg 40001
        slave: 1
        input_type: holding

      - name: "hp_control_method"
        unique_id: "modbus.hp_control_method"
        scan_interval: 10
        address: 1 # reg 40002
        slave: 1
        input_type: holding

      - name: "hp_target_temp_circuit1" # Target Temperature HC1 (Radiator)
        unique_id: "modbus.hp_target_temp_circuit1"
        scale: 0.1
        precision: 2
        scan_interval: 10
        address: 2 # reg 40003
        slave: 1
        unit_of_measurement: °C
        input_type: holding

      - name: "hp_room_air_temp_circuit1"
        unique_id: "modbus.hp_room_air_temp_circuit1"
        scale: 0.1
        precision: 2
        scan_interval: 10
        address: 3 # reg 40004
        slave: 1
        unit_of_measurement: °C
        input_type: holding

      - name: "hp_shift_value_in_auto_mode_circuit1" # Setpoint Shift HC1 (Radiator)
        unique_id: "modbus.hp_shift_value_in_auto_mode_circuit1"
        precision: 2 #test
        scan_interval: 10
        address: 4 # reg 40005
        #data_type: int16
        slave: 1
        unit_of_measurement: °C
        input_type: holding

      - name: "hp_dhw_target_temp" # DHW Target Temperature
        unique_id: "modbus.hp_dhw_target_temp"
        scale: 0.1
        precision: 2
        scan_interval: 10
        address: 8 # reg 40009
        slave: 1
        unit_of_measurement: °C
        input_type: holding

      - name: "hp_energy_state_input_raw"
        unique_id: "modbus.hp_energy_state_input_raw"
        slave: 1
        scan_interval: 10
        address: 9 # reg 40010
        input_type: holding

    # -------------------------------------------------
    switches:
      # coil_register (binary data, write only)
      # -------------------------------------------------
      - name: "hp_main_switch" # Heat Pump on/off
        unique_id: "modbus.hp_main_switch"
        slave: 1
        address: 0
        write_type: coil
        command_on: 1
        command_off: 0
        verify:
          input_type: coil
          address: 0
          state_on: 1
          state_off: 0

      - name: "hp_dhw" # Domestic Hot Water on/off
        unique_id: "modbus.hp_dhw"
        slave: 1
        address: 1
        write_type: coil
        command_on: 1
        command_off: 0
        verify:
          input_type: coil
          address: 1
          state_on: 1
          state_off: 0

      - name: "hp_silent_mode" # Silent Mode on/off
        unique_id: "modbus.hp_silent_mode"
        slave: 1
        address: 2
        write_type: coil
        command_on: 1
        command_off: 0
        verify:
          input_type: coil
          address: 2
          state_on: 1
          state_off: 0

      - name: "hp_dhw_desinfection_mode" # Disinfection Mode on/off
        unique_id: "modbus.hp_dhw_desinfection_mode"
        slave: 1
        address: 3
        write_type: coil
        command_on: 1
        command_off: 0
        verify:
          input_type: coil
          address: 3
          state_on: 1
          state_off: 0

      - name: "hp_emergency_stop_switch_off" # Emergency Stop Normal Operation / Emergency Stop
        unique_id: "modbus.hp_emergency_stop_switch_off"
        slave: 1
        address: 4
        write_type: coil
        command_on: 1
        command_off: 0
        verify:
          input_type: coil
          address: 4
          state_on: 1
          state_off: 0

      - name: "hp_emergency_stop_switch_on" # Hold Emergency Stop Status / Operation Start
        unique_id: "modbus.hp_emergency_stop_switch_on"
        slave: 1
        address: 5
        write_type: coil
        command_on: 1
        command_off: 0
        verify:
          input_type: coil
          address: 5
          state_on: 1
          state_off: 0

    # -----------------------------------------
    binary_sensors:
      # discrete_input (binary data, read only)
      # -----------------------------------------
      - name: "hp_water_flow_status"
        unique_id: "modbus.hp_water_flow_status"
        scan_interval: 10
        address: 0
        slave: 1
        input_type: discrete_input

      - name: "hp_water_pump_status"
        unique_id: "modbus.hp_water_pump_status"
        scan_interval: 10
        address: 1
        slave: 1
        input_type: discrete_input

      - name: "hp_ext_water_pump_status"
        unique_id: "modbus.hp_ext_water_pump_status"
        scan_interval: 10
        address: 2
        slave: 1
        input_type: discrete_input

      - name: "hp_compressor_status"
        unique_id: "modbus.hp_compressor_status"
        scan_interval: 10
        address: 3
        slave: 1
        input_type: discrete_input

      - name: "hp_defrosting_status"
        unique_id: "modbus.hp_defrosting_status"
        scan_interval: 10
        address: 4
        slave: 1
        input_type: discrete_input

      - name: "hp_dhw_heating_status"
        unique_id: "modbus.hp_dhw_heating_status"
        scan_interval: 10
        address: 5
        slave: 1
        input_type: discrete_input

      - name: "hp_dhw_tank_desinfection_status"
        unique_id: "modbus.hp_dhw_tank_desinfection_status"
        scan_interval: 10
        address: 6
        slave: 1
        input_type: discrete_input

      - name: "hp_silent_mode_status"
        unique_id: "modbus.hp_silent_mode_status"
        scan_interval: 10
        address: 7
        slave: 1
        input_type: discrete_input

      - name: "hp_cooling_status"
        unique_id: "modbus.hp_cooling_status"
        scan_interval: 10
        address: 8
        slave: 1
        input_type: discrete_input

      - name: "hp_solar_pump_status"
        unique_id: "modbus.hp_solar_pump_status"
        scan_interval: 10
        address: 9
        slave: 1
        input_type: discrete_input

      - name: "hp_backup_heater_step1_status"
        unique_id: "modbus.hp_backup_heater_step1_status"
        scan_interval: 10
        address: 10
        slave: 1
        input_type: discrete_input

      - name: "hp_backup_heater_step2_status"
        unique_id: "modbus.hp_backup_heater_step2_status"
        scan_interval: 10
        address: 11
        slave: 1
        input_type: discrete_input

      - name: "hp_dhw_boost_heater_status"
        unique_id: "modbus.hp_dhw_boost_heater_status"
        scan_interval: 10
        address: 12
        slave: 1
        input_type: discrete_input

      - name: "hp_error_status"
        unique_id: "modbus.hp_error_status"
        scan_interval: 10
        address: 13
        slave: 1
        input_type: discrete_input

      - name: "hp_emergency_operation_available_space_heating/cooling"
        unique_id: "modbus.hp_emergency_operation_available_space_heating_cooling"
        scan_interval: 10
        address: 14
        slave: 1
        input_type: discrete_input

      - name: "hp_emergency_operation_available_dhw"
        unique_id: "modbus.hp_emergency_operation_available_dhw"
        scan_interval: 10
        address: 15
        slave: 1
        input_type: discrete_input

      - name: "hp_mix_pump_status"
        unique_id: "modbus.hp_mix_pump_status"
        scan_interval: 10
        address: 16
        slave: 1
        input_type: discrete_input

input_number:
  # Input Number
  # -----------------------------------------
  hp_shift_value_in_auto_mode_circuit1:
    name: "Set HP Setpoint Shift in AI Mode - HC1 (Radiator)"
    min: -5
    max: 5
    step: 1

  hp_circuit1_target_temp:
    name: "Target Temperature HC1 # Target Temperature HC1 Radiator"
    min: 20
    max: 60
    step: 1

  hp_dhw_target_temp:
    name: "Target Temperature DHW"
    min: 40
    max: 60
    step: 1

input_select:
  # Input Select
  # -----------------------------------------
  hp_set_operation_mode:
    name: "Selector Heatpump Operation Mode"
    options:
      - "Cooling"
      - "Heating"
      - "Auto"

  hp_set_control_method:
    name: "Selector Heatpump Control Method"
    options:
      - "Water Outlet Temp. Control"
      - "Water Inlet Temp. Control"
      - "Room Air Control"

template:
  # Template sensors for better readability
  #-----------------------------------------
  - sensor:
      - name: "HP Energy State"
        unique_id: "hp_energy_state_label"
        state: >
            {% set v = states('sensor.hp_energy_state_input_raw') | int(-1) %}
            {% if v == 0 %} Do Not Use
            {% elif v == 1 %} Forced Off
            {% elif v == 2 %} Normal Operation
            {% elif v == 3 %} On-Recommendation
            {% elif v == 4 %} On-Command
            {% elif v == 5 %} On-Command Step 2
            {% elif v == 6 %} On-Recommendation Step 1
            {% elif v == 7 %} Energy Saving Mode
            {% elif v == 8 %} Super Energy Saving Mode
            {% else %} Unknown
            {% endif %}

      - name: "HP Thermal Power"
        unique_id: "hp_thermal_power"
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: >
          {% set flow = states('sensor.hp_flow_rate') | float(0) %}
          {% set dt = states('sensor.hp_outlet_temp') | float(0) - states('sensor.hp_inlet_temp') | float(0) %}
          {% if dt > 0 and dt < 15 %}
            {{ [flow * 69.77 * dt, 10000] | min | round(0) }}
          {% else %}
            0
          {% endif %}

      - name: "HP COP"
        unique_id: "hp_cop"
        state_class: measurement
        state: >
          {% set p_thermal = states('sensor.hp_thermal_power') | float(0) %}
          {% set p_elec = states('sensor.shellypro3em_a4f00fcfb120_phase_a_vykon') | float(0)
                        + states('sensor.shellypro3em_a4f00fcfb120_phase_c_vykon') | float(0) %}
          {% if p_elec > 0 %}
            {{ (p_thermal / p_elec) | round(2) }}
          {% else %}
            0
          {% endif %}

# ---------------------------------------------------------------------------------------------------------------
# Automations: Write modbus registers on input changes via GUI
# note: If you change a value by the sliders, it will take up to 60 seconds until the state variables are updated
# ---------------------------------------------------------------------------------------------------------------

automation:
  ### Input Select Operation Mode ###
  #-------------------------------------------------------------------------------
  - id: "hp_automation_operation_mode_modbus_update"
    alias: "[Heatpump] Operation Mode Modbus Update"
    description: "Select Operation Mode of Heatpump - send via Modbus"
    triggers:
      - trigger: state
        entity_id:
          - input_select.hp_set_operation_mode
    condition: []
    variables:
      cooling: 0
      auto: 3
      heating: 4
    action:
      - action: modbus.write_register
        data:
          hub: lg_heatpump
          slave: 1
          address: 0
          value: >-
            {% if is_state('input_select.hp_set_operation_mode', 'Cooling') %} {{cooling}}
            {% elif is_state('input_select.hp_set_operation_mode', 'Heating') %} {{heating}}
            {% else %}
            {{auto}}
            {% endif %}
    mode: single

  - id: "hp_automation_operation_mode_input_select_update"
    alias: "[Heatpump] Operation Mode InputSelect Update"
    description: "Select Operation Mode of Heatpump - Read from State"
    triggers:
      - trigger: state
        entity_id:
          - sensor.hp_operation_mode
    condition: []
    action:
      - action: input_select.select_option
        target:
          entity_id: input_select.hp_set_operation_mode
        data:
          option: >
            {% if is_state('sensor.hp_operation_mode', '3') %}
            Auto
            {% elif is_state('sensor.hp_operation_mode', '4') %}
            Heating
            {% else %}
            Cooling
            {% endif %}
    mode: single

  ### Input Select Control Mode ###
  #-------------------------------------------------------------------------------

  - id: "hp_automation_control_method_modbus_update"
    alias: "[Heatpump] Control Method Modbus Update"
    description: "Select Control Method of Heatpump - send via Modbus"
    triggers:
      - trigger: state
        entity_id:
          - input_select.hp_set_control_method
    condition: []
    variables:
      outlet: 0
      inlet: 1
      room_air: 2
    action:
      - action: modbus.write_register
        data_template:
          hub: lg_heatpump
          slave: 1
          address: 1
          value: >-
            {% if is_state('input_select.hp_set_control_method', 'Water Outlet Temp. Control') %}
            {{outlet}}
            {% elif is_state('input_select.hp_set_control_method', 'Water Inlet Temp. Control') %}
            {{inlet}}
            {% else %}
            {{room_air}}
            {% endif %}
    mode: single

  - id: "hp_automation_control_method_input_select_update"
    alias: "[Heatpump] Control Method InputSelect Update"
    description: "Select Control Method of Heatpump - Read from State"
    triggers:
      - trigger: state
        entity_id:
          - sensor.hp_control_method
    condition: []
    action:
      - action: input_select.select_option
        target:
          entity_id: input_select.hp_set_control_method
        data:
          option: >
            {% if is_state('sensor.hp_control_method', '0') %}
            Water Outlet Temp. Control
            {% elif is_state('sensor.hp_control_method', '1') %}
            Water Inlet Temp. Control
            {% else %}
            Room Air Control
            {% endif %}
    mode: single

  ### Setpoint Shift for Heating Circuit 1 (Radiator) ###
  #-------------------------------------------------------------------------------

  - id: "hp_automation_set_shift_value_in_auto_mode_circuit1_modbus_update"
    alias: "hp_automation_set_shift_value_in_auto_mode_circuit1_modbus_update"
    description: "Write change of flow temperature HC1 in AI mode to Modbus"
    triggers:
      - trigger: state
        entity_id:
          - input_number.hp_shift_value_in_auto_mode_circuit1
    condition: []
    action:
      - action: modbus.write_register
        data_template:
          hub: lg_heatpump
          slave: 1
          address: 4
          value: >
            {% if states('input_number.hp_shift_value_in_auto_mode_circuit1') | int(default=0) < 0 %}
            {{states('input_number.hp_shift_value_in_auto_mode_circuit1') | int + 65536 }}
            {% else %}
            {{states('input_number.hp_shift_value_in_auto_mode_circuit1') | int }}
            {% endif %}
    mode: single

  - id: "hp_automation_set_shift_value_in_auto_mode_circuit1_input_slider_update"
    alias: "hp_automation_set_shift_value_in_auto_mode_circuit1_input_slider_update"
    description: "Write change of flow temperature HC1 in AI mode to Input Slider"
    triggers:
      - trigger: state
        entity_id:
          - sensor.hp_shift_value_in_auto_mode_circuit1
    condition: []
    action:
      - action: input_number.set_value
        target:
          entity_id: input_number.hp_shift_value_in_auto_mode_circuit1
        data:
          value: "{{ states('sensor.hp_shift_value_in_auto_mode_circuit1') }}"
    mode: single

  ### HC1 Target Temperature ###
  #-------------------------------------------------------------------------------

  - id: "hp_automation_set_target_temperatur_circuit1_modbus_update"
    alias: "hp_automation_set_target_temperatur_circuit1_modbus_update"
    description: "Write change of HC1 target temperature to Modbus"
    triggers:
      - trigger: state
        entity_id:
          - input_number.hp_circuit1_target_temp
    condition: []
    action:
      - action: modbus.write_register
        data_template:
          hub: lg_heatpump
          slave: 1
          address: 2
          value: "{{ states('input_number.hp_circuit1_target_temp') |float *10 | int}}"
    mode: single

  - id: "hp_automation_set_target_temperatur_circuit1_input_slider_update"
    alias: "hp_automation_set_target_temperatur_circuit1_input_slider_update"
    description: "Write change of HC1 target temperature to Input Slider"
    triggers:
      - trigger: state
        entity_id:
          - sensor.hp_target_temp_circuit1
    condition: []
    action:
      - action: input_number.set_value
        target:
          entity_id: input_number.hp_circuit1_target_temp
        data:
          value: "{{ states('sensor.hp_target_temp_circuit1') }}"
    mode: single

  ### DHW Target Temperature ###
  #-------------------------------------------------------------------------------

  - id: "hp_automation_set_target_temperatur_modbus_update"
    alias: "hp_automation_set_target_temperatur_modbus_update"
    description: "Write change of DHW target temperature to Modbus"
    triggers:
      - trigger: state
        entity_id:
          - input_number.hp_dhw_target_temp
    condition: []
    action:
      - action: modbus.write_register
        data_template:
          hub: lg_heatpump
          slave: 1
          address: 8
          value: "{{ states('input_number.hp_dhw_target_temp') |float *10 | int}}"
    mode: single

  - id: "hp_automation_set_target_temperatur_input_slider_update"
    alias: "hp_automation_set_target_temperatur_input_slider_update"
    description: "Write change of DHW target temperature to Input Slider"
    triggers:
      - trigger: state
        entity_id:
          - sensor.hp_dhw_target_temp
    condition: []
    action:
      - action: input_number.set_value
        target:
          entity_id: input_number.hp_dhw_target_temp
        data:
          value: "{{ states('sensor.hp_dhw_target_temp') }}"
    mode: single
