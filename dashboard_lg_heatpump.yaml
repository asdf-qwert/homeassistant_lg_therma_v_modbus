title: LG Therma V
views:
  - title: Přehled
    icon: mdi:heat-pump
    type: sections
    max_columns: 2
    sections:
      - cards:
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.hp_dashboard_locked
                state: "off"
            card:
              type: custom:mushroom-entity-card
              entity: input_boolean.hp_dashboard_locked
              name: Zámek ovládání
              icon: mdi:lock-open
              tap_action:
                action: toggle
              icon_color: green
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.hp_dashboard_locked
                state: "on"
            card:
              type: custom:mushroom-entity-card
              entity: input_boolean.hp_dashboard_locked
              name: Zámek ovládání – ZAMČENO
              icon: mdi:lock
              tap_action:
                action: toggle
              icon_color: red
      - cards:
          - type: heading
            heading: Ovládání
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.hp_dashboard_locked
                state: "off"
            card:
              type: custom:mushroom-entity-card
              entity: switch.hp_main_switch
              name: Podlahovka
              icon: mdi:heating-coil
              tap_action:
                action: toggle
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.hp_dashboard_locked
                state: "on"
            card:
              type: custom:mushroom-entity-card
              entity: switch.hp_main_switch
              name: Podlahovka
              icon: mdi:heating-coil
              tap_action:
                action: none
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.hp_dashboard_locked
                state: "off"
            card:
              type: custom:mushroom-select-card
              entity: input_select.hp_set_operation_mode
              name: Režim provozu
              icon: mdi:thermostat
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.hp_dashboard_locked
                state: "on"
            card:
              type: custom:mushroom-entity-card
              entity: input_select.hp_set_operation_mode
              name: Režim provozu
              icon: mdi:thermostat
              tap_action:
                action: none
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.hp_dashboard_locked
                state: "off"
            card:
              type: custom:mushroom-entity-card
              entity: switch.hp_dhw
              name: Ohřev TUV
              icon: mdi:water-boiler
              tap_action:
                action: toggle
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.hp_dashboard_locked
                state: "on"
            card:
              type: custom:mushroom-entity-card
              entity: switch.hp_dhw
              name: Ohřev TUV
              icon: mdi:water-boiler
              tap_action:
                action: none
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.hp_dashboard_locked
                state: "off"
            card:
              type: custom:mushroom-entity-card
              entity: switch.hp_silent_mode
              name: Tichý režim
              icon: mdi:volume-off
              tap_action:
                action: toggle
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.hp_dashboard_locked
                state: "on"
            card:
              type: custom:mushroom-entity-card
              entity: switch.hp_silent_mode
              name: Tichý režim
              icon: mdi:volume-off
              tap_action:
                action: none
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.hp_dashboard_locked
                state: "off"
            card:
              type: custom:mushroom-entity-card
              entity: switch.hp_dhw_desinfection_mode
              name: Dezinfekce TUV
              icon: mdi:bacteria
              tap_action:
                action: toggle
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.hp_dashboard_locked
                state: "on"
            card:
              type: custom:mushroom-entity-card
              entity: switch.hp_dhw_desinfection_mode
              name: Dezinfekce TUV
              icon: mdi:bacteria
              tap_action:
                action: none
      - cards:
          - type: heading
            heading: Nastavení teplot
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.hp_dashboard_locked
                state: "off"
            card:
              type: custom:mushroom-number-card
              entity: input_number.hp_dhw_target_temp
              name: Cílová teplota TUV
              icon: mdi:water-thermometer
              display_mode: buttons
              secondary_info: none
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.hp_dashboard_locked
                state: "on"
            card:
              type: custom:mushroom-entity-card
              entity: input_number.hp_dhw_target_temp
              name: Cílová teplota TUV
              icon: mdi:water-thermometer
              tap_action:
                action: none
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.hp_dashboard_locked
                state: "off"
            card:
              type: custom:mushroom-number-card
              entity: input_number.hp_circuit1_target_temp
              name: Cílová teplota podlahy
              icon: mdi:heating-coil
              display_mode: buttons
              secondary_info: none
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.hp_dashboard_locked
                state: "on"
            card:
              type: custom:mushroom-entity-card
              entity: input_number.hp_circuit1_target_temp
              name: Cílová teplota podlahy
              icon: mdi:heating-coil
              tap_action:
                action: none
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.hp_dashboard_locked
                state: "off"
            card:
              type: custom:mushroom-number-card
              entity: input_number.hp_shift_value_in_auto_mode_circuit1
              name: Korekce v Auto režimu
              icon: mdi:tune
              display_mode: buttons
              secondary_info: none
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.hp_dashboard_locked
                state: "on"
            card:
              type: custom:mushroom-entity-card
              entity: input_number.hp_shift_value_in_auto_mode_circuit1
              name: Korekce v Auto režimu
              icon: mdi:tune
              tap_action:
                action: none
      - cards:
          - type: heading
            heading: Aktuální teploty
          - type: custom:mushroom-entity-card
            entity: sensor.hp_outside_temp
            name: Venkovní teplota
            icon: mdi:thermometer
          - type: custom:mushroom-entity-card
            entity: sensor.hp_room_temp
            name: Teplota v místnosti
            icon: mdi:home-thermometer
          - type: custom:mushroom-entity-card
            entity: sensor.hp_dhw_water_temp
            name: Teplota TUV
            icon: mdi:water-thermometer
          - type: custom:mushroom-entity-card
            entity: sensor.hp_delta_temp
            name: ΔT (výstup – přívod)
            icon: mdi:delta
          - type: custom:mushroom-entity-card
            entity: sensor.hp_outlet_temp
            name: Výstupní teplota
            icon: mdi:thermometer-chevron-up
          - type: custom:mushroom-entity-card
            entity: sensor.hp_inlet_temp
            name: Přívodní teplota
            icon: mdi:thermometer-chevron-down
          - type: custom:mushroom-entity-card
            entity: sensor.hp_backup_heater_outlet_temp
            name: Záložní ohřev (výstup)
            icon: mdi:heating-coil
      - cards:
          - type: heading
            heading: Provozní hodnoty
          - type: custom:mushroom-entity-card
            entity: sensor.shellypro3em_a4f00fcfb120_phase_a_vykon
            name: Spotřeba (jednotky)
            icon: mdi:lightning-bolt
          - type: custom:mushroom-entity-card
            entity: sensor.shellypro3em_a4f00fcfb120_phase_c_vykon
            name: Spotřeba (ohřívač TUV)
            icon: mdi:water-boiler
          - type: custom:mushroom-entity-card
            entity: sensor.hp_thermal_power
            name: Tepelný výkon
            icon: mdi:fire
          - type: custom:mushroom-entity-card
            entity: sensor.hp_cop
            name: COP
            icon: mdi:leaf
          - type: custom:mushroom-entity-card
            entity: sensor.hp_flow_rate
            name: Průtok vody
            icon: mdi:waves-arrow-right
          - type: custom:mushroom-entity-card
            entity: sensor.hp_compressor_rpm
            name: Otáčky kompresoru
            icon: mdi:rotate-3d-variant
          - type: custom:mushroom-entity-card
            entity: sensor.hp_error_code
            name: Kód chyby
            icon: mdi:alert
      - cards:
          - type: heading
            heading: Topná křivka
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.hp_dashboard_locked
                state: "off"
            card:
              type: custom:mushroom-entity-card
              entity: input_boolean.hp_heating_curve_enabled
              name: Topná křivka
              icon: mdi:chart-bell-curve
              tap_action:
                action: toggle
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.hp_dashboard_locked
                state: "on"
            card:
              type: custom:mushroom-entity-card
              entity: input_boolean.hp_heating_curve_enabled
              name: Topná křivka
              icon: mdi:chart-bell-curve
              tap_action:
                action: none
          - type: entities
            title: Korekce
            entities:
              - entity: sensor.hp_outside_temp
                name: "① Venkovní teplota"
                icon: mdi:thermometer
              - entity: sensor.hp_forecast_min_temp
                name: "① Předpověď min."
                icon: mdi:cloud-clock
              - entity: sensor.hp_curve_design_temp
                name: "→ Návrhová teplota"
                icon: mdi:thermometer-lines
              - entity: sensor.hp_curve_raw
                name: "→ Křivka (před korekcemi)"
                icon: mdi:chart-bell-curve
              - type: divider
              - entity: sensor.hp_solar_correction
                name: "② Solární korekce"
                icon: mdi:white-balance-sunny
              - entity: sensor.hp_room_correction
                name: "③ Korekce místnosti"
                icon: mdi:home-thermometer
              - type: divider
              - entity: sensor.hp_heating_curve_setpoint
                name: "→ Výsledná teplota vody"
                icon: mdi:thermometer-auto

          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.hp_dashboard_locked
                state: "off"
            card:
              type: entities
              title: Parametry křivky
              entities:
                - entity: input_number.hp_curve_shift
                  name: Posun křivky
                  icon: mdi:tune-vertical
                - entity: input_number.hp_room_target_temp
                  name: Cílová teplota místnosti
                  icon: mdi:home-thermometer-outline
                - entity: input_number.hp_curve_point1_outdoor
                  name: Bod 1 – venkovní (teplý)
                  icon: mdi:thermometer-chevron-up
                - entity: input_number.hp_curve_point1_water
                  name: Bod 1 – voda (teplý)
                  icon: mdi:water-thermometer-outline
                - entity: input_number.hp_curve_point2_outdoor
                  name: Bod 2 – venkovní (studený)
                  icon: mdi:thermometer-chevron-down
                - entity: input_number.hp_curve_point2_water
                  name: Bod 2 – voda (studený)
                  icon: mdi:water-thermometer
                - entity: input_number.hp_curve_heating_cutoff
                  name: Cutoff (vypnutí topení)
                  icon: mdi:thermometer-off
          - type: conditional
            conditions:
              - condition: state
                entity: input_boolean.hp_dashboard_locked
                state: "on"
            card:
              type: entities
              title: Parametry křivky
              entities:
                - entity: input_number.hp_curve_shift
                  name: Posun křivky
                  icon: mdi:tune-vertical
                  tap_action:
                    action: none
                - entity: input_number.hp_room_target_temp
                  name: Cílová teplota místnosti
                  icon: mdi:home-thermometer-outline
                  tap_action:
                    action: none
                - entity: input_number.hp_curve_point1_outdoor
                  name: Bod 1 – venkovní (teplý)
                  icon: mdi:thermometer-chevron-up
                  tap_action:
                    action: none
                - entity: input_number.hp_curve_point1_water
                  name: Bod 1 – voda (teplý)
                  icon: mdi:water-thermometer-outline
                  tap_action:
                    action: none
                - entity: input_number.hp_curve_point2_outdoor
                  name: Bod 2 – venkovní (studený)
                  icon: mdi:thermometer-chevron-down
                  tap_action:
                    action: none
                - entity: input_number.hp_curve_point2_water
                  name: Bod 2 – voda (studený)
                  icon: mdi:water-thermometer
                  tap_action:
                    action: none
                - entity: input_number.hp_curve_heating_cutoff
                  name: Cutoff (vypnutí topení)
                  icon: mdi:thermometer-off
                  tap_action:
                    action: none

      - cards:
          - type: heading
            heading: Stav komponent
          - type: glance
            show_state: false
            entities:
              - entity: binary_sensor.hp_compressor_status
                name: Kompresor
                icon: mdi:engine
              - entity: binary_sensor.hp_water_pump_status
                name: Vodní čerpadlo
                icon: mdi:pump
              - entity: binary_sensor.hp_ext_water_pump_status
                name: Ext. čerpadlo
                icon: mdi:pump-off
              - entity: binary_sensor.hp_defrosting_status
                name: Odmrazování
                icon: mdi:snowflake-melt
              - entity: binary_sensor.hp_dhw_heating_status
                name: Ohřev TUV
                icon: mdi:water-boiler
              - entity: binary_sensor.hp_cooling_status
                name: Chlazení
                icon: mdi:snowflake
              - entity: binary_sensor.hp_backup_heater_active
                name: Záložní ohřev
                icon: mdi:fire
              - entity: binary_sensor.hp_error_status
                name: Chybový stav
                icon: mdi:alert-circle
  - title: Diagnostika
    icon: mdi:chart-line
    type: sections
    max_columns: 2
    sections:
      - column_span: 4
        cards:
          - type: heading
            heading: Historie
          - type: history-graph
            title: Historie
            hours_to_show: 24
            entities:
              - entity: sensor.shellypro3em_a4f00fcfb120_phase_a_vykon
              - entity: sensor.shellypro3em_a4f00fcfb120_phase_c_vykon
              - entity: sensor.hp_outside_temp
                name: Venkovní
              - entity: sensor.hp_room_temp
                name: Místnost
              - entity: sensor.hp_dhw_water_temp
                name: TUV
            grid_options:
              columns: full
      - cards:
          - type: heading
            heading: Grafy teplot
          - type: history-graph
            title: Teploty oběhu
            hours_to_show: 24
            entities:
              - entity: sensor.hp_outlet_temp
                name: Výstup
              - entity: sensor.hp_inlet_temp
                name: Přívod
              - entity: sensor.hp_outside_temp
                name: Venkovní
            grid_options:
              columns: full
      - cards:
          - type: heading
            heading: Chladivový okruh
          - type: custom:mushroom-entity-card
            entity: sensor.hp_high_pressure
            name: Vysoký tlak
            icon: mdi:gauge-full
          - type: custom:mushroom-entity-card
            entity: sensor.hp_low_pressure
            name: Nízký tlak
            icon: mdi:gauge-empty
          - type: custom:mushroom-entity-card
            entity: sensor.hp_temp_heatgas
            name: Horký plyn
            icon: mdi:fire
          - type: custom:mushroom-entity-card
            entity: sensor.hp_temp_suction
            name: Sací teplota
            icon: mdi:thermometer-minus
          - type: custom:mushroom-entity-card
            entity: sensor.hp_temp_liquid_gas
            name: Kapalné chladivo
            icon: mdi:gas-cylinder
          - type: custom:mushroom-entity-card
            entity: sensor.hp_temp_pipe_out
            name: Výstup potrubí
            icon: mdi:pipe
          - type: custom:mushroom-entity-card
            entity: sensor.hp_temp_before_vaporiser
            name: Před výparníkem
            icon: mdi:thermometer-check
          - type: custom:mushroom-entity-card
            entity: sensor.hp_temp_after_vaporiser
            name: Za výparníkem
            icon: mdi:thermometer-water
      - column_span: 4
        cards:
          - type: heading
            heading: COP statistiky
          - type: statistics-graph
            title: COP průměr
            entities:
              - entity: sensor.hp_cop_stats
                name: COP
              - entity: sensor.hp_outside_temp
                name: Venkovní teplota
            stat_types:
              - mean
            period: day
            days_to_show: 30
            grid_options:
              columns: full
      - column_span: 4
        cards:
          - type: heading
            heading: Systémové info
            grid_options:
              columns: 24
              rows: 1
          - type: entities
            entities:
              - entity: sensor.hp_error_code
                name: Kód chyby
                icon: mdi:alert-circle
              - entity: sensor.hp_odu_operation_cycle
                name: Provozní cyklus
                icon: mdi:counter
              - entity: sensor.hp_energy_state
                name: Energetický stav
                icon: mdi:lightning-bolt
              - entity: sensor.hp_product_group
                name: Skupina produktu
                icon: mdi:identifier
              - entity: sensor.hp_product_info
                name: Info o produktu
                icon: mdi:information
              - type: conditional
                conditions:
                  - condition: state
                    entity: input_boolean.hp_dashboard_locked
                    state: "off"
                row:
                  entity: input_select.hp_set_control_method
                  name: Metoda řízení
                  icon: mdi:tune-variant
              - type: conditional
                conditions:
                  - condition: state
                    entity: input_boolean.hp_dashboard_locked
                    state: "on"
                row:
                  entity: input_select.hp_set_control_method
                  name: Metoda řízení
                  icon: mdi:tune-variant
                  tap_action:
                    action: none
          - type: entities
            title: Počty startů
            entities:
              - entity: sensor.hp_compressor_starts_today
                name: Dnes
                icon: mdi:calendar-today
              - entity: sensor.hp_compressor_starts_week
                name: Tento týden
                icon: mdi:calendar-week
              - entity: sensor.hp_compressor_starts_month
                name: Tento měsíc
                icon: mdi:calendar-month
              - entity: sensor.hp_compressor_starts_year
                name: Tento rok
                icon: mdi:calendar
          - type: statistics-graph
            title: Starty kompresoru – historie
            entities:
              - entity: sensor.hp_compressor_starts_today
                name: Starty
            stat_types:
              - max
            period: day
            days_to_show: 365
            grid_options:
              columns: full
